<!DOCTYPE html>

<html>

<head>

<title>JobHub</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet" href="css/responsive.css">

</head>


<body>


<header>


<h1>
JobHub
</h1>


<button id="menuBtn">

☰

</button>



<<nav id="navMenu">


<a href="#home">

Home

</a>


<a href="#jobsSection">

Jobs

</a>


<button id="darkMode" aria-label="Dark mode">

Dark Mode

</button>


</nav>


</header>




<section class="hero" id="home">


<h2>
Find Your Dream Job
</h2>


<p>
Search thousands of opportunities from top companies
</p>


</section>





<section class="filters">


<input 
id="search"
placeholder="Search job title">


<select id="location">


<option value="">
All Locations
</option>


<option>
Remote
</option>


<option>
India
</option>


<option>
USA
</option>


</select>




<select id="company">


<option value="">
All Companies
</option>


<option>
Google
</option>


<option>
Microsoft
</option>


<option>
Amazon
</option>


</select>


</section>






<section id="jobsSection">


<h2>
Available Jobs
</h2>


<div id="jobs">


<div class="skeleton job"></div>

<div class="skeleton job"></div>

<div class="skeleton job"></div>


</div>


</section>




<div class="pagination">


<button onclick="previousPage()">
Previous
</button>


<span id="page">
1
</span>


<button onclick="nextPage()">
Next
</button>


</div>


<div id="applyBox" class="modal">


<div class="application">


<h2>
Apply For Job
</h2>


<h3 id="jobName"></h3>



<input 
id="applicantName"
placeholder="Your Name">



<input 
id="applicantEmail"
placeholder="Your Email">



<textarea
id="coverLetter"
placeholder="Why should we hire you?">

</textarea>



<button onclick="submitApplication()">

Submit Application

</button>



<button onclick="closeForm()">

Cancel

</button>



</div>


</div>


<script src="js/app.js"></script>


</body>


</html>
